name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Lint
        run: make lint

      - name: Test
        run: make ci

      - name: Test summary
        uses: test-summary/action@v2
        with:
          paths: .build/reports/swift-test-results.xml
        if: ${{ always() && hashFiles('.build/reports/swift-test-results.xml') != '' }}
